on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Publish main debug prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="main-debug"
          APK_NAME="yobidashi-main-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          # Replace any existing main-debug release so only the latest main
          # build is published under this tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting previous release ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "Main debug build (${SHORT_SHA})" \
            --notes "Automatic debug build of main at ${HEAD_SHA}" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"
